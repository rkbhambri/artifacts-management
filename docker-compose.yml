services:
  postgres:
    image: postgres:16-alpine
    container_name: artifacts-postgres
    command: ["postgres", "-p", "5436"]
    environment:
      POSTGRES_USER: pit
      POSTGRES_PASSWORD: pit
      POSTGRES_DB: artifacts
    ports:
      - "5436:5436"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pit -d artifacts -p 5436"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: artifacts-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      API_KEY: ${API_KEY:-dev-internal-api-key}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      DB_HOST: postgres
      DB_PORT: 5436
      DB_USERNAME: pit
      DB_PASSWORD: pit
      DB_NAME: artifacts
    ports:
      - "4000:4000"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_API_KEY: ${API_KEY:-dev-internal-api-key}
    container_name: artifacts-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:4000}
    ports:
      - "3000:3000"

volumes:
  pgdata:
